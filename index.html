<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles/general.css"></link>
  <link rel="stylesheet" href="styles/container.css"></link>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h2 class="">Welcome to Wordly</h2> 

    <form id="wordly-form">
      <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="search for a word here...." id="wordly-input"aria-label="Example text with button addon" aria-describedby="button-addon1">
        <button class="btn btn-outline-secondary" type="button" id="button-addon1">
          Search
        </button>
      </div>
    </form>

    <div class="content">
      <div class="definition"></div>
      <div class="audio"></div>
    </div>
  </div>
  <script src="wordly.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
